server.port=8080

# ─── MYSQL DATABASE CONFIGURATION ───────────────────────────────────
# If the cloud provides an external URL/User/Password, Spring Boot uses it. 
# Otherwise, it falls back to your local setup automatically.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/workhive_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Sreeshanth@19}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / HIBERNATE ORM MANAGEMENT ─────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── PERFORMANCE & SCALING OPTIMIZATIONS ────────────────────────────
# Boost worker threads to manage up to 500 simultaneous requests
server.tomcat.max-threads=500

# Expand the database pool size so 50 threads can talk to MySQL at once
spring.datasource.hikari.maximum-pool-size=50