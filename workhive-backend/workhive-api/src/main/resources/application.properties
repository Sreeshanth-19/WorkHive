server.port=8080

# ─── MYSQL DATABASE CONFIGURATION ───────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/workhive_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Sreeshanth@19
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / HIBERNATE ORM MANAGEMENT ─────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── PERFORMANCE & SCALING OPTIMIZATIONS ────────────────────────────
# Boost worker threads to manage up to 500 simultaneous requests
server.tomcat.max-threads=500

# Expand the database pool size so 50 threads can talk to MySQL at once
spring.datasource.hikari.maximum-pool-size=50